<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mi Membresía — LAB NUTRITION</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --lab-red: #E30613;
      --lab-red-dark: #B00510;
      --lab-black: #0A0A0A;
      --lab-white: #FFFFFF;
      --lab-gray: #F5F5F5;
      --lab-border: #E5E5E5;
      --lab-muted: #666666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--lab-white); color: var(--lab-black); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    /* HERO */
    .hero { padding: 48px 24px 32px; text-align: center; border-bottom: 1px solid var(--lab-border); background: var(--lab-white); }
    .hero-logo { width: 72px; height: 72px; object-fit: contain; margin: 0 auto 18px; display: block; }
    .hero-title { font-size: clamp(26px, 4vw, 36px); font-weight: 900; letter-spacing: -.5px; color: var(--lab-red); text-transform: uppercase; }
    .hero-sub { font-size: 14px; color: var(--lab-muted); margin-top: 8px; font-weight: 500; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--lab-black); color: var(--lab-white); padding: 7px 16px; border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 16px; }
    .hero-badge.inactive { background: transparent; color: var(--lab-red); border: 1.5px solid var(--lab-red); }
    .hero-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
    .hero-badge.inactive::before { background: var(--lab-red); }

    .container { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }

    /* SECTION */
    .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2.5px; color: var(--lab-red); margin: 0 0 14px 2px; }
    .card { background: var(--lab-white); border: 1px solid var(--lab-border); border-radius: 12px; overflow: hidden; margin-bottom: 22px; }
    .card-inner { padding: 24px; }

    /* BANNER PROMO */
    .promo-banner { display: block; border-radius: 12px; overflow: hidden; margin-bottom: 24px; border: 2px solid var(--lab-black); background: var(--lab-black); color: var(--lab-white); transition: transform .15s; }
    .promo-banner:hover { transform: translateY(-2px); }
    .promo-banner img { width: 100%; display: block; max-height: 240px; object-fit: cover; }
    .promo-banner-txt { padding: 16px 22px; font-weight: 700; font-size: 15px; text-align: center; letter-spacing: .3px; }

    /* BLACK DIAMOND CTA (no-member) */
    .bd-cta { background: linear-gradient(135deg, var(--lab-black) 0%, #1a1a1a 100%); color: var(--lab-white); border-radius: 14px; padding: 36px 28px; text-align: center; margin-bottom: 26px; position: relative; overflow: hidden; border: 1px solid var(--lab-black); }
    .bd-cta::before { content: ''; position: absolute; top: -40%; right: -10%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(227,6,19,.25) 0%, transparent 60%); }
    .bd-cta-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 4px; color: var(--lab-red); margin-bottom: 12px; position: relative; text-transform: uppercase; }
    .bd-cta-eyebrow::before, .bd-cta-eyebrow::after { content: '—'; margin: 0 10px; color: var(--lab-red); opacity: .6; }
    .bd-cta-title { font-size: clamp(22px, 3.5vw, 30px); font-weight: 900; text-transform: uppercase; letter-spacing: -.3px; margin-bottom: 10px; position: relative; }
    .bd-cta-sub { font-size: 14px; color: #ccc; max-width: 520px; margin: 0 auto 22px; position: relative; line-height: 1.5; }
    .bd-cta-btn { display: inline-block; background: var(--lab-red); color: var(--lab-white); padding: 14px 34px; border-radius: 8px; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; transition: .15s; position: relative; }
    .bd-cta-btn:hover { background: var(--lab-red-dark); transform: translateY(-1px); }

    /* BENEFITS */
    .benefits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
    .benefits-grid.layout-list { grid-template-columns: 1fr; }
    .benefit { background: var(--lab-gray); border-radius: 10px; padding: 20px 16px; text-align: center; border: 1px solid var(--lab-border); transition: .2s; }
    .benefit:hover { border-color: var(--lab-red); }
    .layout-list .benefit { display: flex; text-align: left; align-items: center; gap: 16px; padding: 16px 20px; }
    .layout-list .benefit-icon { font-size: 28px; margin-bottom: 0; flex-shrink: 0; }
    .layout-list .benefit-title { margin-bottom: 2px; }
    .benefit-num { font-family: 'Menlo', monospace; font-size: 10px; font-weight: 700; color: var(--lab-red); letter-spacing: 2px; margin-bottom: 14px; }
    .layout-list .benefit-num { margin-bottom: 0; margin-right: 4px; flex-shrink: 0; width: 30px; }
    .benefit-title { font-size: 13px; font-weight: 800; margin-bottom: 4px; color: var(--lab-black); }
    .benefit-desc { font-size: 11px; color: var(--lab-muted); line-height: 1.4; }

    /* PRODUCT OF THE WEEK */
    .potw { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .potw-img { width: 180px; height: 180px; border-radius: 10px; object-fit: cover; border: 1px solid var(--lab-border); flex-shrink: 0; background: var(--lab-gray); }
    .potw-info { flex: 1; min-width: 200px; }
    .potw-badge { display: inline-block; background: var(--lab-red); color: var(--lab-white); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; padding: 5px 12px; border-radius: 4px; margin-bottom: 12px; }
    .potw-name { font-size: 20px; font-weight: 800; margin-bottom: 6px; color: var(--lab-black); }
    .potw-desc { font-size: 13px; color: var(--lab-muted); margin-bottom: 14px; line-height: 1.5; }
    .potw-prices { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
    .potw-price-new { font-size: 26px; font-weight: 900; color: var(--lab-red); }
    .potw-price-old { font-size: 15px; color: var(--lab-muted); text-decoration: line-through; }
    .potw-coupon { display: inline-flex; align-items: center; gap: 8px; background: var(--lab-white); border: 2px dashed var(--lab-red); border-radius: 8px; padding: 10px 16px; }
    .potw-coupon-code { font-family: 'Menlo', monospace; font-size: 16px; font-weight: 900; color: var(--lab-red); letter-spacing: 2px; }
    .potw-coupon-label { font-size: 10px; color: var(--lab-muted); text-transform: uppercase; letter-spacing: 1px; }
    .potw-btn { display: inline-block; background: var(--lab-black); color: var(--lab-white); padding: 12px 28px; border-radius: 8px; font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 14px; transition: .15s; }
    .potw-btn:hover { background: var(--lab-red); }

    /* EVENTS TIMELINE */
    .timeline { position: relative; padding-left: 26px; }
    .timeline::before { content: ''; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--lab-red); border-radius: 2px; }
    .event { position: relative; margin-bottom: 16px; padding: 14px 18px; background: var(--lab-gray); border-radius: 10px; border: 1px solid var(--lab-border); }
    .event::before { content: ''; position: absolute; left: -23px; top: 20px; width: 10px; height: 10px; border-radius: 50%; background: var(--lab-red); border: 2px solid var(--lab-white); }
    .event-title { font-size: 14px; font-weight: 800; color: var(--lab-black); letter-spacing: .2px; }
    .event-date { font-size: 11px; color: var(--lab-red); font-weight: 700; margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
    .event-desc { font-size: 12px; color: var(--lab-muted); margin-top: 6px; line-height: 1.5; }

    /* CTA BUTTONS */
    .cta-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .cta-btn { display: inline-block; padding: 12px 26px; border-radius: 8px; font-weight: 700; font-size: 13px; text-decoration: none; transition: .15s; letter-spacing: .3px; }
    .cta-btn.primary { background: var(--lab-red); color: var(--lab-white); }
    .cta-btn.primary:hover { background: var(--lab-red-dark); }
    .cta-btn.secondary { background: var(--lab-white); color: var(--lab-black); border: 1.5px solid var(--lab-black); }
    .cta-btn.secondary:hover { background: var(--lab-black); color: var(--lab-white); }

    /* WHATSAPP FLOATING */
    .wa-float { position: fixed; bottom: 24px; right: 24px; background: #25D366; color: #fff; padding: 14px 22px 14px 18px; border-radius: 100px; font-weight: 700; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(37,211,102,.35); z-index: 100; transition: .2s; }
    .wa-float:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 14px 36px rgba(37,211,102,.45); }
    .wa-inline { display: inline-flex; align-items: center; gap: 10px; background: #25D366; color: #fff; padding: 13px 26px; border-radius: 10px; font-weight: 700; font-size: 13px; text-decoration: none; transition: .15s; }
    .wa-inline:hover { background: #1eb555; }

    /* FOOTER */
    .footer { text-align: center; padding: 32px 20px; border-top: 1px solid var(--lab-border); font-size: 11px; color: var(--lab-muted); letter-spacing: .3px; }
    .footer strong { color: var(--lab-red); font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

    /* MY SUBSCRIPTIONS — additive 2026-04-30 */
    .mysubs-grid { display: flex; flex-direction: column; gap: 16px; }
    .mysub-card { background: var(--lab-white); border: 1px solid var(--lab-border); border-radius: 14px; padding: 22px; transition: border-color .15s; }
    .mysub-card:hover { border-color: var(--lab-black); }
    .mysub-head { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 18px; }
    .mysub-img { width: 88px; height: 88px; border-radius: 10px; object-fit: contain; background: var(--lab-gray); flex-shrink: 0; padding: 8px; border: 1px solid var(--lab-border); }
    .mysub-info { flex: 1; min-width: 200px; }
    .mysub-name { font-size: 17px; font-weight: 800; color: var(--lab-black); letter-spacing: -.2px; margin-bottom: 4px; }
    .mysub-plan { font-size: 12px; color: var(--lab-muted); margin-bottom: 10px; }
    .mysub-status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 100px; font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .mysub-status.active { background: #dcfce7; color: #166534; }
    .mysub-status.paused { background: #fef3c7; color: #92400e; }
    .mysub-status.cancelled { background: #fee2e2; color: #991b1b; }
    .mysub-status.payment_failed { background: #fee2e2; color: #991b1b; }
    .mysub-status.completed { background: #dbeafe; color: #1e40af; }
    .mysub-status.pending_payment { background: #f3e8ff; color: #6b21a8; }
    .mysub-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .6; }
    .mysub-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 14px; padding: 16px; background: var(--lab-gray); border-radius: 10px; margin-bottom: 16px; }
    .mysub-stat { font-size: 11px; }
    .mysub-stat-label { color: var(--lab-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; font-size: 10px; margin-bottom: 4px; }
    .mysub-stat-value { color: var(--lab-black); font-size: 14px; font-weight: 800; }
    .mysub-stat-value.red { color: var(--lab-red); }
    .mysub-gifts-row { background: linear-gradient(180deg, #fff5f5, #fff); border: 1px dashed var(--lab-red); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; font-size: 12.5px; }
    .mysub-gifts-row b { color: var(--lab-red); font-weight: 800; letter-spacing: .5px; text-transform: uppercase; font-size: 10.5px; display: block; margin-bottom: 6px; }
    .mysub-gifts-row ul { list-style: none; padding: 0; margin: 0; }
    .mysub-gifts-row li { padding: 3px 0; color: var(--lab-black); display: flex; align-items: center; gap: 6px; }
    .mysub-gifts-row li::before { content: '✓'; color: var(--lab-red); font-weight: 900; }
    .mysub-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .mysub-action { padding: 9px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--lab-border); background: var(--lab-white); color: var(--lab-black); letter-spacing: .3px; transition: .15s; font-family: inherit; }
    .mysub-action:hover { border-color: var(--lab-black); }
    .mysub-action.primary { background: var(--lab-black); color: var(--lab-white); border-color: var(--lab-black); }
    .mysub-action.primary:hover { background: var(--lab-red); border-color: var(--lab-red); }
    .mysub-action.danger:hover { border-color: var(--lab-red); color: var(--lab-red); }
    .mysub-warn { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 12px; color: #92400e; line-height: 1.5; }
    .mysub-warn b { color: #78350f; }

    /* MODAL */
    .modal-bg { position: fixed; inset: 0; background: rgba(10,10,10,.6); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
    .modal-bg.show { display: flex; }
    .modal-box { background: var(--lab-white); border-radius: 14px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px; }
    .modal-title { font-size: 20px; font-weight: 900; color: var(--lab-black); margin-bottom: 8px; letter-spacing: -.3px; }
    .modal-desc { font-size: 14px; color: var(--lab-muted); line-height: 1.55; margin-bottom: 20px; }
    .modal-form-group { margin-bottom: 14px; }
    .modal-form-label { display: block; font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--lab-muted); margin-bottom: 6px; }
    .modal-form-input, .modal-form-select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--lab-border); border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color .15s; box-sizing: border-box; }
    .modal-form-input:focus, .modal-form-select:focus { outline: none; border-color: var(--lab-black); }
    .modal-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }
    .modal-btn { padding: 12px 22px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; border: 1.5px solid; font-family: inherit; }
    .modal-btn-cancel { background: var(--lab-white); color: var(--lab-muted); border-color: var(--lab-border); }
    .modal-btn-confirm { background: var(--lab-black); color: var(--lab-white); border-color: var(--lab-black); }
    .modal-btn-confirm:hover { background: var(--lab-red); border-color: var(--lab-red); }
    .modal-btn-danger { background: var(--lab-red); color: var(--lab-white); border-color: var(--lab-red); }
    .modal-msg { padding: 10px 14px; border-radius: 8px; margin-top: 12px; font-size: 12.5px; }
    .modal-msg.error { background: #fee2e2; color: #991b1b; }
    .modal-msg.success { background: #dcfce7; color: #166534; }

    /* LOGIN BLOCK */
    .login-block { background: var(--lab-white); border: 1px solid var(--lab-border); border-radius: 14px; padding: 32px 24px; text-align: center; max-width: 420px; margin: 24px auto; }
    .login-block h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
    .login-block p { color: var(--lab-muted); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .login-block input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--lab-border); border-radius: 8px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; font-family: inherit; }
    .login-block button { width: 100%; padding: 12px; background: var(--lab-black); color: var(--lab-white); border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .login-block button:hover { background: var(--lab-red); }

    /* LOADING */
    .loading { text-align: center; padding: 60px 20px; color: var(--lab-muted); }
    .loading-spinner { width: 30px; height: 30px; border: 3px solid var(--lab-border); border-top-color: var(--lab-red); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .hero { padding: 36px 16px 24px; }
      .container { padding: 20px 14px 100px; }
      .potw { flex-direction: column; }
      .potw-img { width: 100%; height: auto; aspect-ratio: 1; }
      .benefits-grid { grid-template-columns: 1fr 1fr; }
      .wa-float { bottom: 16px; right: 16px; padding: 12px 18px 12px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading"><div class="loading-spinner"></div><div>Cargando tu membresía...</div></div>
  </div>

  <script>
    const BACKEND = location.origin;
    const params = new URLSearchParams(location.search);
    const email = params.get('email') || '';

    async function load() {
      try {
        const [config, settings] = await Promise.all([
          fetch(BACKEND + '/api/portal-config').then(r => r.json()).catch(() => ({})),
          fetch(BACKEND + '/api/settings').then(r => r.json()).catch(() => ({}))
        ]);

        // ── Detect if visitor is active member ──
        let isActiveMember = false;
        if (email) {
          try {
            const subs = await fetch(BACKEND + '/api/subscriptions/customer/' + encodeURIComponent(email)).then(r => r.json()).catch(() => []);
            isActiveMember = Array.isArray(subs) && subs.some(s => s.status === 'active' || s.status === 'paused');
          } catch (e) {}
        }

        const brandName = settings.brand_name || config.page_title || 'Club Black Diamond';
        const brandSlogan = config.page_subtitle || settings.brand_slogan || 'Beneficios exclusivos para miembros activos';
        const brandLogo = settings.brand_logo || '';

        document.title = brandName + ' — LAB NUTRITION';

        let html = '<div class="hero">';
        if (brandLogo) html += '<img src="' + brandLogo + '" alt="Logo" class="hero-logo">';
        html += '<div class="hero-title">' + brandName + '</div>';
        html += '<div class="hero-sub">' + brandSlogan + '</div>';
        html += '<div class="hero-badge' + (isActiveMember ? '' : ' inactive') + '">' + (isActiveMember ? 'Miembro activo' : 'No miembro') + '</div>';
        html += '</div>';

        // Hero image (bajo el hero, antes del container)
        if (config.hero_image) {
          html += '<div style="max-width:820px;margin:0 auto;padding:0 20px"><img src="' + config.hero_image + '" alt="" style="width:100%;display:block;border-radius:12px;margin-top:20px;max-height:320px;object-fit:cover"></div>';
        }

        html += '<div class="container">';

        // ── RENDERERS ──
        const renderers = {
          bd_cta: () => {
            if (isActiveMember) return '';
            const bdTitle = config.bd_title || 'Conviértete en cliente Black Diamond';
            const bdSub = config.bd_subtitle || 'Hasta 50% OFF permanente · envío prioritario · regalos exclusivos · acceso a lanzamientos';
            const bdBtnText = config.bd_btn_text || 'Quiero ser Black Diamond';
            const bdBtnUrl = config.bd_btn_url || 'https://labnutrition.com/collections/all';
            let h = '<div class="bd-cta">';
            h += '<div class="bd-cta-eyebrow">Club Black Diamond</div>';
            h += '<div class="bd-cta-title">' + bdTitle + '</div>';
            h += '<div class="bd-cta-sub">' + bdSub + '</div>';
            if (config.bd_image) h += '<img src="' + config.bd_image + '" alt="" style="display:block;max-width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin:0 auto 18px;position:relative">';
            h += '<a href="' + bdBtnUrl + '" class="bd-cta-btn" target="_blank" rel="noopener">' + bdBtnText + '</a>';
            h += '</div>';
            return h;
          },
          banner: () => {
            if (!config.banner_text && !config.banner_image) return '';
            const bUrl = config.banner_url || '#';
            const bImg = config.banner_image || '';
            const bTxt = config.banner_text || '';
            let h = '<a href="' + bUrl + '" target="_blank" rel="noopener" class="promo-banner">';
            if (bImg) h += '<img src="' + bImg + '" alt="">';
            if (bTxt) h += '<div class="promo-banner-txt">' + bTxt + '</div>';
            h += '</a>';
            return h;
          },
          benefits: () => {
            // SOLO del admin. Sin defaults. Si está vacío, no sale.
            const list = Array.isArray(config.benefits) ? config.benefits.filter(b => b && b.title) : [];
            if (!list.length) return '';
            const layout = config.benefits_layout || 'grid';
            let h = '<div class="section-title">' + (config.benefits_title || 'Beneficios') + '</div><div class="card"><div class="card-inner"><div class="benefits-grid ' + (layout === 'list' ? 'layout-list' : '') + '">';
            h += list.map((b, i) => '<div class="benefit"><div class="benefit-num">' + String(i + 1).padStart(2, '0') + '</div><div class="benefit-title">' + b.title + '</div><div class="benefit-desc">' + (b.description || '') + '</div></div>').join('');
            h += '</div></div></div>';
            return h;
          },
          product: () => {
            const pw = config.product_of_week;
            if (!pw || !pw.name) return '';
            let h = '<div class="section-title">' + (config.product_section_title || 'Producto destacado') + '</div><div class="card"><div class="card-inner"><div class="potw">';
            if (pw.image) h += '<img src="' + pw.image + '" alt="' + pw.name + '" class="potw-img">';
            h += '<div class="potw-info">'
              + '<div class="potw-badge">Exclusivo suscriptores</div>'
              + '<div class="potw-name">' + pw.name + '</div>'
              + (pw.description ? '<div class="potw-desc">' + pw.description + '</div>' : '')
              + '<div class="potw-prices"><span class="potw-price-new">S/ ' + (pw.sub_price || pw.price) + '</span>'
              + (pw.price && pw.sub_price ? '<span class="potw-price-old">S/ ' + pw.price + '</span>' : '') + '</div>'
              + (pw.coupon ? '<div class="potw-coupon"><div><div class="potw-coupon-code">' + pw.coupon + '</div><div class="potw-coupon-label">Código exclusivo</div></div></div>' : '')
              + (pw.url ? '<div><a href="' + pw.url + '" class="potw-btn" target="_blank">' + (config.product_button_text || 'Comprar ahora') + '</a></div>' : '')
              + '</div></div></div></div>';
            return h;
          },
          events: () => {
            const list = Array.isArray(config.events) ? config.events.filter(e => e && e.title) : [];
            if (!list.length) return '';
            let h = '<div class="section-title">' + (config.events_title || 'Próximos eventos') + '</div><div class="card"><div class="card-inner"><div class="timeline">';
            h += list.map(ev => '<div class="event">'
              + '<div class="event-title">' + ev.title + '</div>'
              + (ev.date ? '<div class="event-date">' + new Date(ev.date).toLocaleDateString('es-PE', { day: 'numeric', month: 'long', year: 'numeric' }) + '</div>' : '')
              + (ev.description ? '<div class="event-desc">' + ev.description + '</div>' : '')
              + '</div>').join('');
            h += '</div></div></div>';
            return h;
          },
          ctas: () => {
            const list = Array.isArray(config.cta_buttons) ? config.cta_buttons.filter(c => c && c.text && c.url) : [];
            if (!list.length) return '';
            return '<div class="card"><div class="card-inner"><div class="cta-row">'
              + list.map(c => '<a href="' + c.url + '" class="cta-btn ' + (c.style === 'secondary' ? 'secondary' : 'primary') + '" target="_blank">' + c.text + '</a>').join('')
              + '</div></div></div>';
          },
          custom_html: () => config.custom_html ? '<div class="card"><div class="card-inner">' + config.custom_html + '</div></div>' : '',
          my_subscriptions: () => {
            // Solo si hay email visible y subs cargadas (las cargamos abajo)
            // Render placeholder con id que se rellena con loadMySubs()
            return '<div id="mysubs-mount"></div>';
          }
        };

        const defaultOrder = ['my_subscriptions', 'bd_cta', 'banner', 'benefits', 'product', 'events', 'ctas', 'custom_html'];
        const order = Array.isArray(config.section_order) && config.section_order.length ? config.section_order.filter(k => renderers[k]) : defaultOrder;
        // Append any missing renderers at end (safety)
        defaultOrder.forEach(k => { if (!order.includes(k)) order.push(k); });
        order.forEach(k => { html += renderers[k](); });

        // ── WHATSAPP (inline link si NO flotante) ──
        const waNumber = (config.whatsapp_number || settings.whatsapp_number || '51936105037').replace(/\D/g, '');
        const waMsg = encodeURIComponent(config.whatsapp_message || 'Hola, soy suscriptor de LAB NUTRITION y necesito ayuda.');
        const waText = config.whatsapp_btn_text || 'Soporte por WhatsApp';
        const waFloat = config.whatsapp_floating !== false;
        const waUrl = 'https://wa.me/' + waNumber + '?text=' + waMsg;

        if (!waFloat && waNumber) {
          html += '<div style="text-align:center;margin-top:14px"><a href="' + waUrl + '" target="_blank" rel="noopener" class="wa-inline">'
            + '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.553 4.12 1.52 5.856L.057 23.988l6.271-1.443A11.93 11.93 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.98 0-3.82-.578-5.37-1.573l-.385-.23-3.726.857.892-3.633-.252-.4A9.78 9.78 0 012.18 12c0-5.422 4.398-9.82 9.82-9.82 5.422 0 9.82 4.398 9.82 9.82 0 5.422-4.398 9.82-9.82 9.82z"/></svg>'
            + waText + '</a></div>';
        }

        html += '</div><div class="footer"><strong>LAB NUTRITION</strong> · Club Black Diamond<br>Portal del suscriptor · IGV incluido</div>';

        // ── WHATSAPP FLOATING ──
        if (waFloat && waNumber) {
          html += '<a href="' + waUrl + '" target="_blank" rel="noopener" class="wa-float">'
            + '<svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.553 4.12 1.52 5.856L.057 23.988l6.271-1.443A11.93 11.93 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.98 0-3.82-.578-5.37-1.573l-.385-.23-3.726.857.892-3.633-.252-.4A9.78 9.78 0 012.18 12c0-5.422 4.398-9.82 9.82-9.82 5.422 0 9.82 4.398 9.82 9.82 0 5.422-4.398 9.82-9.82 9.82z"/></svg>'
            + waText + '</a>';
        }

        document.getElementById('app').innerHTML = html;

        // Cargar y renderizar mis suscripciones (si hay email)
        if (email) await loadMySubs(email);
        else mountLoginBlock();
      } catch (e) {
        document.getElementById('app').innerHTML = '<div class="container"><div class="card"><div class="card-inner" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:10px">⚠</div><div style="font-weight:700;margin-bottom:6px">Error al cargar</div><div style="font-size:13px;color:#666">' + e.message + '</div></div></div></div>';
      }
    }

    /* ── HELPERS ───────────────────────────────────────────────── */
    function fmtMoney(n) { return 'S/ ' + Number(n || 0).toFixed(2); }
    function fmtDate(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('es-PE', { day: '2-digit', month: 'long', year: 'numeric' });
      } catch { return iso.slice(0, 10); }
    }
    function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    /* ── MIS SUSCRIPCIONES ─────────────────────────────────────── */
    async function loadMySubs(email) {
      const mount = document.getElementById('mysubs-mount');
      if (!mount) return;
      try {
        const r = await fetch(BACKEND + '/api/portal/me/' + encodeURIComponent(email));
        const data = await r.json();
        const subs = Array.isArray(data.subscriptions) ? data.subscriptions : [];
        if (!subs.length) {
          mount.innerHTML = '<div class="section-title">Mi suscripción</div><div class="card"><div class="card-inner" style="text-align:center;padding:32px 20px"><div style="font-size:14px;color:#555;line-height:1.6">No encontramos suscripciones para <b>' + escHtml(email) + '</b>.<br>Si pagaste recientemente, esperá unos minutos. Si querés suscribirte, mirá <a href="https://labnutrition.com/pages/suscripciones" style="color:#bd1718;font-weight:700">los planes</a>.</div></div></div>';
          return;
        }
        let h = '<div class="section-title">Mi suscripción</div><div class="mysubs-grid">';
        for (const s of subs) {
          const statusClass = (s.status || 'active').toLowerCase();
          const statusLabel = ({ active: 'Activa', paused: 'Pausada', cancelled: 'Cancelada', payment_failed: 'Pago fallido', completed: 'Completada', pending_payment: 'Pago pendiente' })[statusClass] || s.status;
          const cyclesLeft = Math.max(0, (s.cycles_required || 0) - (s.cycles_completed || 0));
          const productImg = s.product_image || '';

          h += '<div class="mysub-card">';
          h += '  <div class="mysub-head">';
          h += productImg ? '<img class="mysub-img" src="' + escHtml(productImg) + '" alt="">' : '<div class="mysub-img"></div>';
          h += '    <div class="mysub-info">';
          h += '      <div class="mysub-name">' + escHtml(s.product_title || 'Producto') + '</div>';
          h += '      <div class="mysub-plan">' + escHtml(s.plan_label || '') + (s.discount_pct ? ' · <b style="color:#bd1718">' + Math.round(s.discount_pct) + '% OFF</b>' : '') + '</div>';
          h += '      <span class="mysub-status ' + statusClass + '">' + statusLabel + '</span>';
          h += '    </div>';
          h += '  </div>';

          // Warning si tiene tag pending_data (datos incompletos)
          const needsCompleteData = (s.has_pending_data === true) || (!s.dni || (s.shipping_address && (!s.shipping_address.address1 || !s.shipping_address.city || !s.shipping_address.province)));
          if (needsCompleteData && s.status === 'active') {
            h += '<div class="mysub-warn"><b>⚠ Faltan datos para tu próximo envío.</b> Completá tu DNI y dirección para que tu próxima caja llegue sin demoras.</div>';
          }

          h += '  <div class="mysub-stats">';
          h += '    <div class="mysub-stat"><div class="mysub-stat-label">Precio mensual</div><div class="mysub-stat-value">' + fmtMoney(s.final_price) + '</div></div>';
          h += '    <div class="mysub-stat"><div class="mysub-stat-label">Próximo cobro</div><div class="mysub-stat-value red">' + fmtDate(s.next_charge_at) + '</div></div>';
          h += '    <div class="mysub-stat"><div class="mysub-stat-label">Ciclos</div><div class="mysub-stat-value">' + (s.cycles_completed || 0) + ' de ' + (s.cycles_required || '?') + '</div></div>';
          h += '    <div class="mysub-stat"><div class="mysub-stat-label">Quedan</div><div class="mysub-stat-value">' + cyclesLeft + ' meses</div></div>';
          h += '  </div>';

          // Regalo
          if (Array.isArray(s.gifts_planned) && s.gifts_planned.length > 0) {
            h += '<div class="mysub-gifts-row">';
            h += '<b>' + (s.gifts_delivered ? 'Regalo entregado' : 'Regalo de bienvenida (próximo envío)') + '</b>';
            h += '<ul>';
            for (const g of s.gifts_planned) {
              h += '<li>' + escHtml(g.product_title || '') + (g.variant_title ? ' — ' + escHtml(g.variant_title) : '') + '</li>';
            }
            h += '</ul>';
            h += '</div>';
          }

          // Acciones
          h += '<div class="mysub-actions">';
          if (needsCompleteData) {
            h += '<button class="mysub-action primary" onclick="openEditModal(\'' + s.id + '\', \'' + escHtml(email) + '\')">Completar datos</button>';
          } else {
            h += '<button class="mysub-action" onclick="openEditModal(\'' + s.id + '\', \'' + escHtml(email) + '\')">Editar datos de envío</button>';
          }
          if (s.status === 'active') {
            h += '<button class="mysub-action" onclick="openPauseModal(\'' + s.id + '\')">Pausar</button>';
            h += '<button class="mysub-action danger" onclick="openCancelModal(\'' + s.id + '\')">Cancelar</button>';
          } else if (s.status === 'paused') {
            h += '<button class="mysub-action primary" onclick="resumeSub(\'' + s.id + '\')">Reactivar</button>';
            h += '<button class="mysub-action danger" onclick="openCancelModal(\'' + s.id + '\')">Cancelar</button>';
          }
          h += '</div>';
          h += '</div>'; // mysub-card
        }
        h += '</div>';
        mount.innerHTML = h;
        // Guardar para los modales
        window._mySubs = subs.reduce((acc, s) => { acc[s.id] = s; return acc; }, {});
      } catch (e) {
        mount.innerHTML = '<div class="card"><div class="card-inner">Error cargando tus suscripciones: ' + escHtml(e.message) + '</div></div>';
      }
    }

    function mountLoginBlock() {
      const app = document.getElementById('app');
      if (document.getElementById('mysubs-mount')) return; // ya renderizado
      const block = document.createElement('div');
      block.className = 'container';
      block.innerHTML = '<div class="login-block"><h3>Ver mi suscripción</h3><p>Ingresá el email con el que te suscribiste para ver tus pedidos y gestionar tu plan.</p><input id="login-email" type="email" placeholder="tu@email.com" autocomplete="email"><button onclick="goWithEmail()">Continuar</button></div>';
      app.appendChild(block);
    }
    window.goWithEmail = function() {
      const v = document.getElementById('login-email').value.trim();
      if (!v) return;
      location.search = 'email=' + encodeURIComponent(v);
    };

    /* ── MODALES ───────────────────────────────────────────────── */
    function openModal(html) {
      let bg = document.getElementById('lab-modal-bg');
      if (!bg) {
        bg = document.createElement('div');
        bg.id = 'lab-modal-bg';
        bg.className = 'modal-bg';
        bg.onclick = (e) => { if (e.target === bg) closeModal(); };
        document.body.appendChild(bg);
      }
      bg.innerHTML = '<div class="modal-box">' + html + '</div>';
      bg.classList.add('show');
    }
    function closeModal() {
      const bg = document.getElementById('lab-modal-bg');
      if (bg) bg.classList.remove('show');
    }
    window.closeModal = closeModal;

    window.openEditModal = function(subId, customerEmail) {
      const s = (window._mySubs || {})[subId];
      if (!s) return;
      const a = s.shipping_address || {};
      const html =
        '<div class="modal-title">Editar mis datos</div>' +
        '<div class="modal-desc">Estos datos se usan para enviarte tu producto cada mes y para el comprobante electrónico.</div>' +
        '<div class="modal-form-group"><label class="modal-form-label">Nombre completo</label><input class="modal-form-input" id="m-name" value="' + escHtml(s.customer_name || '') + '"></div>' +
        '<div class="modal-form-row">' +
        '  <div class="modal-form-group"><label class="modal-form-label">Tipo doc</label><select class="modal-form-select" id="m-tipodoc"><option value="01"' + ((s.tipo_documento || '01') === '01' ? ' selected' : '') + '>DNI</option><option value="06"' + (s.tipo_documento === '06' ? ' selected' : '') + '>RUC</option></select></div>' +
        '  <div class="modal-form-group"><label class="modal-form-label">Documento</label><input class="modal-form-input" id="m-dni" value="' + escHtml(s.dni || '').replace(/^0+$/, '') + '" placeholder="8 a 11 dígitos"></div>' +
        '</div>' +
        '<div class="modal-form-group"><label class="modal-form-label">Teléfono</label><input class="modal-form-input" id="m-phone" value="' + escHtml(s.customer_phone || '') + '"></div>' +
        '<div class="modal-form-group"><label class="modal-form-label">Dirección</label><input class="modal-form-input" id="m-addr1" value="' + escHtml(a.address1 || '').replace(/POR COMPLETAR.*/, '') + '" placeholder="Av., calle, número"></div>' +
        '<div class="modal-form-row">' +
        '  <div class="modal-form-group"><label class="modal-form-label">Distrito</label><input class="modal-form-input" id="m-city" value="' + escHtml(a.city || '') + '" placeholder="Ej: San Isidro"></div>' +
        '  <div class="modal-form-group"><label class="modal-form-label">Provincia</label><input class="modal-form-input" id="m-province" value="' + escHtml(a.province || 'Lima') + '" placeholder="Lima"></div>' +
        '</div>' +
        '<div id="m-msg"></div>' +
        '<div class="modal-actions"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancelar</button><button class="modal-btn modal-btn-confirm" id="m-save">Guardar</button></div>';
      openModal(html);
      document.getElementById('m-save').onclick = async () => {
        const btn = document.getElementById('m-save');
        const msg = document.getElementById('m-msg');
        btn.disabled = true; btn.textContent = 'Guardando...';
        try {
          const body = {
            email: customerEmail,
            customer_name: document.getElementById('m-name').value.trim(),
            customer_phone: document.getElementById('m-phone').value.trim(),
            tipo_documento: document.getElementById('m-tipodoc').value,
            dni: document.getElementById('m-dni').value.trim(),
            shipping_address: {
              address1: document.getElementById('m-addr1').value.trim(),
              city: document.getElementById('m-city').value.trim(),
              province: document.getElementById('m-province').value.trim()
            }
          };
          const r = await fetch(BACKEND + '/api/portal/subscription/' + subId + '/update-customer-data', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const j = await r.json();
          if (!r.ok) { msg.innerHTML = '<div class="modal-msg error">' + escHtml(j.error || 'Error al guardar') + '</div>'; btn.disabled = false; btn.textContent = 'Guardar'; return; }
          msg.innerHTML = '<div class="modal-msg success">Datos actualizados. Refrescando...</div>';
          setTimeout(() => location.reload(), 1200);
        } catch (e) {
          msg.innerHTML = '<div class="modal-msg error">' + escHtml(e.message) + '</div>';
          btn.disabled = false; btn.textContent = 'Guardar';
        }
      };
    };

    window.openPauseModal = function(subId) {
      const html =
        '<div class="modal-title">Pausar suscripción</div>' +
        '<div class="modal-desc">Tu suscripción quedará pausada. No te haremos cobros hasta que la reactives. Podés volver cuando quieras.</div>' +
        '<div id="m-msg"></div>' +
        '<div class="modal-actions"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Volver</button><button class="modal-btn modal-btn-confirm" id="m-confirm">Pausar</button></div>';
      openModal(html);
      document.getElementById('m-confirm').onclick = async () => {
        const btn = document.getElementById('m-confirm'); const msg = document.getElementById('m-msg');
        btn.disabled = true; btn.textContent = 'Pausando...';
        try {
          const r = await fetch(BACKEND + '/api/subscriptions/' + subId + '/pause', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
          const j = await r.json();
          if (!r.ok) { msg.innerHTML = '<div class="modal-msg error">' + escHtml(j.error || 'Error') + '</div>'; btn.disabled = false; btn.textContent = 'Pausar'; return; }
          msg.innerHTML = '<div class="modal-msg success">Suscripción pausada. Refrescando...</div>';
          setTimeout(() => location.reload(), 1200);
        } catch (e) {
          msg.innerHTML = '<div class="modal-msg error">' + escHtml(e.message) + '</div>';
          btn.disabled = false; btn.textContent = 'Pausar';
        }
      };
    };

    window.openCancelModal = async function(subId) {
      // Preview de penalty si aplica
      let preview = null;
      try {
        const pr = await fetch(BACKEND + '/api/subscriptions/' + subId + '/cancel/preview');
        if (pr.ok) preview = await pr.json();
      } catch {}
      const penaltyInfo = preview && preview.penalty > 0
        ? '<div class="mysub-warn">Tu plan tiene permanencia. Cancelar ahora aplica una penalidad de <b>S/ ' + Number(preview.penalty).toFixed(2) + '</b>.</div>'
        : '';
      const html =
        '<div class="modal-title">Cancelar suscripción</div>' +
        '<div class="modal-desc">Si cancelás, dejamos de cobrar y enviar producto. ¿Estás seguro?</div>' +
        penaltyInfo +
        '<div id="m-msg"></div>' +
        '<div class="modal-actions"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Volver</button><button class="modal-btn modal-btn-danger" id="m-confirm">Sí, cancelar</button></div>';
      openModal(html);
      document.getElementById('m-confirm').onclick = async () => {
        const btn = document.getElementById('m-confirm'); const msg = document.getElementById('m-msg');
        btn.disabled = true; btn.textContent = 'Cancelando...';
        try {
          const r = await fetch(BACKEND + '/api/subscriptions/' + subId + '/cancel', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ confirmPenalty: true }) });
          const j = await r.json();
          if (!r.ok) { msg.innerHTML = '<div class="modal-msg error">' + escHtml(j.error || 'Error') + '</div>'; btn.disabled = false; btn.textContent = 'Sí, cancelar'; return; }
          if (j.penalty_payment_url) {
            msg.innerHTML = '<div class="modal-msg success">Cancelación iniciada. Te llevamos al pago de la penalidad...</div>';
            setTimeout(() => { window.location.href = j.penalty_payment_url; }, 1500);
          } else {
            msg.innerHTML = '<div class="modal-msg success">Cancelada. Refrescando...</div>';
            setTimeout(() => location.reload(), 1200);
          }
        } catch (e) {
          msg.innerHTML = '<div class="modal-msg error">' + escHtml(e.message) + '</div>';
          btn.disabled = false; btn.textContent = 'Sí, cancelar';
        }
      };
    };

    window.resumeSub = async function(subId) {
      try {
        const r = await fetch(BACKEND + '/api/subscriptions/' + subId + '/resume', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
        const j = await r.json();
        if (!r.ok) { alert(j.error || 'Error'); return; }
        location.reload();
      } catch (e) { alert(e.message); }
    };

    load();
  </script>
</body>
</html>
