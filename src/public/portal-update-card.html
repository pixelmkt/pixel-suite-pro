<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Actualizá tu tarjeta — LAB NUTRITION</title>
<meta name="theme-color" content="#E30613">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--red:#E30613;--red-dark:#B00510;--black:#0A0A0A;--gray-100:#F5F5F5;--gray-200:#E5E5E5;--gray-500:#6B7280;--gray-700:#374151;--gray-900:#111827;--amber:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(180deg,#FAFAFA 0%,#fff 60%);color:var(--gray-900);min-height:100vh;-webkit-font-smoothing:antialiased}

.brand-bar{padding:18px 20px;text-align:center;border-bottom:1px solid var(--gray-200);background:#fff}
.brand-bar .logo{color:var(--red);font-weight:900;letter-spacing:2px;font-size:14px}

.wrap{max-width:560px;margin:0 auto;padding:40px 24px 80px}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05)}

.card-head{background:linear-gradient(135deg,#FEF2F2 0%,#FFF8F8 100%);padding:28px 28px 24px;border-bottom:1px solid #FECACA}
.card-icon{width:56px;height:56px;background:#FEE2E2;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px}
.card-title{font-size:22px;font-weight:900;color:#7F1D1D;letter-spacing:-.3px;margin-bottom:6px}
.card-sub{font-size:14px;color:#991B1B;line-height:1.5}

.card-body{padding:28px}
.section{margin-bottom:22px}
.section h3{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--gray-500);margin-bottom:12px}

.sub-list{display:flex;flex-direction:column;gap:10px}
.sub-item{background:var(--gray-100);border-radius:10px;padding:14px 16px;border:1px solid var(--gray-200)}
.sub-item-name{font-weight:700;color:var(--gray-900);font-size:14px;margin-bottom:4px}
.sub-item-meta{font-size:12px;color:var(--gray-500)}
.sub-item-amount{font-weight:700;color:var(--red);font-size:14px;float:right}

.cta-block{margin:24px 0 16px;text-align:center}
.cta-btn{display:block;background:var(--red);color:#fff;padding:16px 24px;border-radius:10px;font-weight:800;text-decoration:none;font-size:15px;letter-spacing:1px;text-transform:uppercase;transition:background .15s}
.cta-btn:hover{background:var(--red-dark)}
.cta-hint{margin-top:10px;font-size:12px;color:var(--gray-500)}

.steps{background:#FFFBEB;border:1px solid #FCD34D;border-radius:10px;padding:14px 16px;font-size:13px;color:#78350F;line-height:1.6}
.steps b{color:#78350F}
.steps ol{margin:8px 0 0;padding-left:20px}

.foot{margin-top:24px;text-align:center;color:var(--gray-500);font-size:12px;line-height:1.5}
.foot a{color:var(--red)}

.loader-wrap{display:flex;justify-content:center;align-items:center;min-height:50vh}
.loader{width:32px;height:32px;border:3px solid var(--gray-200);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{background:#FEE2E2;border:1px solid #FCA5A5;border-radius:10px;padding:18px;text-align:center;color:#7F1D1D;font-size:14px}

@media (max-width:480px){
  .wrap{padding:24px 16px}
  .card-head{padding:24px 22px 20px}
  .card-body{padding:22px}
  .card-title{font-size:20px}
}
</style>
</head>
<body>

<div class="brand-bar"><div class="logo">LAB NUTRITION</div></div>

<div class="wrap">
  <div id="view-loading" class="loader-wrap"><div class="loader"></div></div>
  <div id="view-content" style="display:none"></div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('token');

async function load(){
  if (!TOKEN){
    document.getElementById('view-loading').innerHTML = '<div class="error">Link inválido. Solicitá un nuevo acceso desde el portal.</div>';
    return;
  }
  try {
    const r = await fetch('/api/portal/v2/update-card-info?token=' + encodeURIComponent(TOKEN));
    if (r.status === 401){
      document.getElementById('view-loading').innerHTML = '<div class="error">El link expiró. Solicitá uno nuevo desde tu portal.</div>';
      return;
    }
    const d = await r.json();
    document.getElementById('view-loading').style.display = 'none';
    document.getElementById('view-content').style.display = 'block';
    render(d);
  } catch (e) {
    document.getElementById('view-loading').innerHTML = '<div class="error">Error: ' + e.message + '</div>';
  }
}

function render(d){
  const subs = d.subscriptions_pending_update || [];
  if (!subs.length){
    document.getElementById('view-content').innerHTML = `
      <div class="card">
        <div class="card-head" style="background:linear-gradient(135deg,#ECFDF5 0%,#F0FDF4 100%);border-bottom-color:#86EFAC">
          <div class="card-icon" style="background:#D1FAE5">✓</div>
          <div class="card-title" style="color:#065F46">No hay nada por actualizar</div>
          <div class="card-sub" style="color:#047857">Todas tus suscripciones están al día. Si recibiste un email reciente, ya lo resolvimos.</div>
        </div>
        <div class="card-body">
          <p style="text-align:center;color:#666;font-size:14px;margin-bottom:18px">Volvé a tu cuenta para ver el detalle.</p>
          <a href="/portal/v2" style="display:block;text-align:center;color:#E30613;font-weight:700;text-decoration:none">← Volver a mi cuenta</a>
        </div>
      </div>`;
    return;
  }
  const first = subs[0];
  document.getElementById('view-content').innerHTML = `
    <div class="card">
      <div class="card-head">
        <div class="card-icon">💳</div>
        <div class="card-title">Necesitamos que actualices tu tarjeta</div>
        <div class="card-sub">Hubo un problema al cobrar tu suscripción este mes. Actualizá tu tarjeta para mantenerla activa y recibir tu próximo pedido.</div>
      </div>
      <div class="card-body">
        <div class="section">
          <h3>Suscripciones con problema</h3>
          <div class="sub-list">
            ${subs.map(s => `
              <div class="sub-item">
                <span class="sub-item-amount">S/ ${(parseFloat(s.amount)||0).toFixed(2)}</span>
                <div class="sub-item-name">${s.product_title || '—'}</div>
                <div class="sub-item-meta">Ciclo ${s.cycles}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="cta-block">
          ${first.payment_link ? `
          <a href="${first.payment_link}" target="_blank" rel="noopener" class="cta-btn">Pagar ahora S/ ${(parseFloat(first.amount)||0).toFixed(2)}</a>
          <div class="cta-hint">Pagás el mes pendiente con cualquier tarjeta, Yape o PagoEfectivo — tu pedido sale automático.</div>
          ` : `
          <a href="${first.mp_update_url}" target="_blank" rel="noopener" class="cta-btn">Actualizar tarjeta ahora</a>
          <div class="cta-hint">Te lleva a MercadoPago. Logueate con tu cuenta y elegí "Cambiar medio de pago".</div>
          `}
        </div>
        <div class="steps">
          <b>📋 Pasos rápidos:</b>
          ${first.payment_link ? `
          <ol>
            <li>Tocá <b>"Pagar ahora"</b> y pagá el mes pendiente (cualquier tarjeta, Yape o PagoEfectivo)</li>
            <li>Tu pedido se genera automático apenas se acredite</li>
            <li>¿Tu tarjeta ya no sirve para los próximos meses? Escribinos por WhatsApp y te mandamos el link para registrar una nueva</li>
          </ol>
          ` : `
          <ol>
            <li>Tocá el botón rojo de arriba</li>
            <li>Iniciá sesión en MercadoPago (mismo email que usaste)</li>
            <li>Tocá <b>"Cambiar medio de pago"</b></li>
            <li>Cargá tu nueva tarjeta</li>
            <li>Listo — el próximo cobro se hace automáticamente</li>
          </ol>
          `}
        </div>
      </div>
    </div>
    <div class="foot">
      ¿Problemas? Respondé el email o escribinos por WhatsApp.<br>
      <a href="/portal/v2?token=${encodeURIComponent(TOKEN)}">← Volver a mi cuenta</a>
    </div>`;
}

load();
</script>
</body>
</html>
