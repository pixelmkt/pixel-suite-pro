api_version = "2026-01"

[[extensions]]
name = "Lab · Suscripción cancelada"
type = "flow_trigger"
handle = "lab-subscription-cancelled"
description = "Se dispara cuando una suscripción se cancela (por el cliente o por el admin). Úsalo para enviar una campaña de recuperación (win-back) con Shopify Email."

  [settings]

    [[settings.fields]]
    type = "customer_reference"

    [[settings.fields]]
    type = "email"
    key = "email"

    [[settings.fields]]
    type = "single_line_text_field"
    key = "product"

    [[settings.fields]]
    type = "single_line_text_field"
    key = "reason"
