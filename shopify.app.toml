client_id = "fc20b3f68f1c8e854a3dca30788acd48"
name = "Suscriptions MP"
application_url = "https://pixel-suite-pro-production.up.railway.app"
embedded = true

[build]
  automatically_update_urls_on_dev = true
  dev_store_url = "nutrition-lab-cluster.myshopify.com"

# 🆕 2026-06-05 — App Proxy: portal cliente dentro de labnutrition.pe
# Cliente entra a: nutrition-lab-cluster.myshopify.com/apps/account-suscripcion
# Shopify hace HMAC-signed forwarding al backend Railway en /apps/account-suscripcion
# Inmutable post-install — confirmar antes de deploy
[app_proxy]
url = "https://pixel-suite-pro-production.up.railway.app/apps/account-suscripcion"
subpath = "account-suscripcion"
prefix = "apps"

[webhooks]
  api_version = "2026-01"

  # 🆕 2026-06-05 — GDPR mandatory compliance webhooks (App Store requirement)
  [webhooks.privacy_compliance]
    customer_deletion_url = "https://pixel-suite-pro-production.up.railway.app/webhooks/shopify/customers_redact"
    customer_data_request_url = "https://pixel-suite-pro-production.up.railway.app/webhooks/shopify/customers_data_request"
    shop_deletion_url = "https://pixel-suite-pro-production.up.railway.app/webhooks/shopify/shop_redact"

  [[webhooks.subscriptions]]
    topics = ["orders/paid"]
    uri = "/webhooks/shopify/orders-paid"

[access_scopes]
  scopes = "write_orders,read_orders,read_customers,write_customers,read_products,write_products,read_purchase_options,write_purchase_options,read_own_subscription_contracts,write_own_subscription_contracts,read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions,read_themes,write_themes"

[auth]
  redirect_urls = [
    "https://pixel-suite-pro-production.up.railway.app/auth/callback",
    "http://localhost:4000/auth/callback"
  ]

[pos]
  embedded = false
